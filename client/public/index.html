<!DOCTYPE html>
<html lang="pt-br">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Instalação de Perfil - Extração de UDID</title>
      <style>
                :root {
                              --primary-color: #3b82f6;
                              --bg-color: #0f172a;
                              --card-bg: #1e293b;
                              --text-color: #f8fafc;
                              --text-muted: #94a3b8;
                }

                body {
                              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                              background-color: var(--bg-color);
                              color: var(--text-color);
                              margin: 0;
                              display: flex;
                              justify-content: center;
                              align-items: center;
                              min-height: 100vh;
                              padding: 20px;
                }

                .container {
                              background-color: var(--card-bg);
                              padding: 40px 30px;
                              border-radius: 24px;
                              box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
                              max-width: 400px;
                              width: 100%;
                              text-align: center;
                }

                .icon-box {
                              width: 80px;
                              height: 80px;
                              background-color: rgba(59, 130, 246, 0.1);
                              border-radius: 20px;
                              display: flex;
                              justify-content: center;
                              align-items: center;
                              margin: 0 auto 24px;
                }

                .icon-box svg {
                              width: 40px;
                              height: 40px;
                              fill: var(--primary-color);
                }

                h1 {
                              font-size: 24px;
                              font-weight: 700;
                              margin-bottom: 12px;
                }

                p {
                              color: var(--text-muted);
                              font-size: 16px;
                              line-height: 1.5;
                              margin-bottom: 32px;
                }

                .btn-install {
                              display: inline-block;
                              background-color: var(--primary-color);
                              color: white;
                              text-decoration: none;
                              padding: 16px 32px;
                              border-radius: 12px;
                              font-weight: 600;
                              font-size: 18px;
                              width: 100%;
                              box-sizing: border-box;
                              transition: transform 0.2s, background-color 0.2s;
                              box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
                }

                .btn-install:active {
                              transform: scale(0.98);
                              background-color: #2563eb;
                }

                .steps {
                              margin-top: 40px;
                              text-align: left;
                              background: rgba(0, 0, 0, 0.2);
                              padding: 20px;
                              border-radius: 16px;
                }

                .step-item {
                              display: flex;
                              align-items: flex-start;
                              margin-bottom: 12px;
                }

                .step-number {
                              background: var(--primary-color);
                              color: white;
                              width: 24px;
                              height: 24px;
                              border-radius: 50%;
                              display: flex;
                              justify-content: center;
                              align-items: center;
                              font-size: 12px;
                              font-weight: bold;
                              margin-right: 12px;
                              flex-shrink: 0;
                }

                .step-text {
                              font-size: 14px;
                              color: var(--text-muted);
                }

                .footer {
                              margin-top: 24px;
                              font-size: 12px;
                              color: #475569;
                }
            </style>
  </head>
  <body>
        <div class="container">
                  <div class="icon-box">
                     
  </body>
      </style></title>
  </head>
