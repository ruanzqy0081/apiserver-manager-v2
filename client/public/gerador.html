<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerador de UDID Aleatório</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.05));
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .icon-box svg {
            width: 42px;
            height: 42px;
            fill: var(--primary-color);
        }
        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.025em;
        }
        p {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-color);
            color: white;
            padding: 16px 32px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
            margin-bottom: 12px;
        }
        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }
        .udid-display {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 20px;
            word-break: break-all;
            display: none;
            color: var(--success-color);
            font-weight: bold;
        }
        .udid-display.show {
            display: block;
        }
        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
        </div>
        <h1>Gerador de UDID</h1>
        <p>Gere um UDID aleatório para registrar no sistema e liberar seu acesso.</p>
        
        <button onclick="generateRandomUDID()" class="btn">GERAR NOVO UDID</button>
        
        <div id="udidBox" class="udid-display"></div>
        <button id="copyBtn" onclick="copyUDID()" class="btn btn-secondary" style="display: none;">COPIAR UDID</button>

        <div class="footer">
            Após copiar, volte ao aplicativo e registre seu dispositivo.
        </div>
    </div>

    <script>
        function generateRandomUDID() {
            const chars = '0123456789abcdef';
            let udid = '';
            for (let i = 0; i < 40; i++) {
                udid += chars[Math.floor(Math.random() * chars.length)];
            }
            
            const box = document.getElementById('udidBox');
            box.textContent = udid;
            box.classList.add('show');
            document.getElementById('copyBtn').style.display = 'inline-flex';
        }

        function copyUDID() {
            const udid = document.getElementById('udidBox').textContent;
            const el = document.createElement('textarea');
            el.value = udid;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('UDID copiado: ' + udid);
        }
    </script>
</body>
</html>
